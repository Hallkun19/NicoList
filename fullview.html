<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>NicoList - 大画面ビュー</title>
  <link rel="stylesheet" href="fullview.css">
</head>
<body>
  <!-- ヘッダー -->
  <header class="fv-header">
    <div class="fv-logo">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--nl-primary)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      <h1>NicoList</h1>
    </div>
    <div class="fv-header-actions">
      <!-- 表示モード切替ボタン -->
      <div class="fv-view-toggle">
        <button id="btn-view-list" class="fv-icon-btn" title="リスト表示">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        </button>
        <button id="btn-view-grid" class="fv-icon-btn" title="グリッド表示">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        </button>
      </div>
      <button id="btn-fv-settings" class="fv-action-btn" title="設定">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg> 設定
      </button>
      <button id="btn-fv-export" class="fv-action-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> エクスポート
      </button>
      <label class="fv-action-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg> インポート
        <input type="file" id="input-fv-import" accept=".json" style="display:none;">
      </label>
    </div>
  </header>

  <div class="fv-container">
    <!-- サイドバー：リスト一覧 -->
    <aside class="fv-sidebar">
      <div class="fv-sidebar-header">
        <h2>マイリスト一覧</h2>
        <div class="fv-list-create">
          <input type="text" id="input-fv-new-list" placeholder="新しいリスト名" maxlength="100">
          <button id="btn-fv-create-list" title="作成">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>
        </div>
      </div>
      <div id="fv-lists-container" class="fv-scrollable">
        <div class="fv-loading">読み込み中...</div>
      </div>
    </aside>

    <!-- メイン：動画一覧 -->
    <main class="fv-main">
      <div class="fv-main-header">
        <div class="fv-main-title-area">
          <h2 id="fv-current-list-title">リストを選択してください</h2>
          <span id="fv-current-list-count" class="fv-meta-text"></span>
        </div>
        <div class="fv-main-controls hidden" id="fv-controls">
          <select id="fv-select-sort">
            <option value="addedAt_desc">追加日 (新しい順)</option>
            <option value="addedAt_asc">追加日 (古い順)</option>
            <option value="postedAt_desc">投稿日 (新しい順)</option>
            <option value="postedAt_asc">投稿日 (古い順)</option>
            <option value="viewCount_desc">再生数 (多い順)</option>
            <option value="viewCount_asc">再生数 (少ない順)</option>
            <option value="mylistCount_desc">マイリス (多い順)</option>
            <option value="likeCount_desc">いいね (多い順)</option>
          </select>
          <button id="btn-fv-play-cont" class="fv-action-btn primary" title="連続再生">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg> 連続再生
          </button>
          <button id="btn-fv-play-shuffle" class="fv-action-btn" title="シャッフル再生">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg> シャッフル
          </button>
          <button id="btn-fv-refresh" class="fv-action-btn" title="動画情報を最新に更新">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg> 情報更新
          </button>
        </div>
      </div>

      <!-- videos-container は JSで .grid または .list クラスを付与 -->
      <div id="fv-videos-container" class="fv-scrollable grid"></div>
    </main>
  </div>

  <script src="fullview.js"></script>
</body>
</html>
