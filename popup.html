<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>NicoList</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- ヘッダー -->
  <header class="header">
    <div class="logo">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--nl-primary)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      <h1>NicoList</h1>
    </div>
    <div class="header-actions">
      <!-- v1.2: 「大画面で開く」から「別タブで開く」に変更。アイコンをSVGに -->
      <button id="btn-fullview" class="icon-btn" title="別タブで開く">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
      </button>
      <button id="btn-settings" class="icon-btn" title="設定">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
      </button>
    </div>
  </header>

  <!-- メイン構成：リスト一覧画面 -->
  <main id="view-lists" class="view active">
    <div class="list-form">
      <input type="text" id="input-new-list" placeholder="新しいリストを作成..." maxlength="100">
      <button id="btn-create-list" title="作成">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </div>
    <div id="lists-container" class="scrollable">
      <div class="loading">リストを読み込み中...</div>
    </div>
  </main>

  <!-- 動画一覧画面 -->
  <main id="view-videos" class="view hidden">
    <div class="back-header">
      <button id="btn-back-to-lists" class="text-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        戻る
      </button>
      <h2 id="current-list-name" class="header-title"></h2>
    </div>

    <!-- コントロールバー -->
    <div class="video-controls">
      <div class="control-group">
        <select id="select-sort">
          <option value="addedAt_desc">追加日 (新しい順)</option>
          <option value="addedAt_asc">追加日 (古い順)</option>
          <option value="postedAt_desc">投稿日 (新しい順)</option>
          <option value="postedAt_asc">投稿日 (古い順)</option>
          <option value="viewCount_desc">再生数 (多い順)</option>
          <option value="viewCount_asc">再生数 (少ない順)</option>
          <option value="mylistCount_desc">マイリス (多い順)</option>
          <option value="likeCount_desc">いいね (多い順)</option>
        </select>
      </div>
      <div class="control-group">
        <button id="btn-play-continuous" class="action-btn primary" title="連続再生">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        </button>
        <button id="btn-play-shuffle" class="action-btn" title="シャッフル再生">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
        </button>
        <button id="btn-refresh-videos" class="action-btn" title="動画情報を最新に更新">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        </button>
      </div>
    </div>

    <div id="videos-container" class="scrollable"></div>
  </main>

  <!-- 設定画面 -->
  <main id="view-settings" class="view hidden">
    <div class="back-header">
      <button id="btn-back-to-lists-from-settings" class="text-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        戻る
      </button>
      <h2>設定 / 連携</h2>
    </div>

    <div class="settings-content scrollable">
      <section class="settings-section">
        <h3>クイック追加</h3>
        <p class="settings-desc">リスト追加ボタンの操作方法を選択できます。</p>
        <select id="select-quick-add-mode" style="width:100%;padding:8px 12px;border-radius:var(--nl-radius-sm);border:1px solid var(--nl-border);background:var(--nl-bg-input);color:var(--nl-text);outline:none;font-size:13px;margin-bottom:8px;">
          <option value="dblclick">ダブルクリックで即追加 / クリックでリスト選択</option>
          <option value="click">クリックで即追加 / ダブルクリックでリスト選択</option>
        </select>
        <p class="settings-desc" style="margin-bottom:6px;">即追加先のリスト:</p>
        <select id="select-default-list" style="width:100%;padding:8px 12px;border-radius:var(--nl-radius-sm);border:1px solid var(--nl-border);background:var(--nl-bg-input);color:var(--nl-text);outline:none;font-size:13px;margin-bottom:4px;">
          <option value="">(未設定 - ダブルクリック無効)</option>
        </select>
      </section>
      <section class="settings-section">
        <h3>マイリスト取り込み</h3>
        <p class="settings-desc">ニコニコ動画の既存マイリストをNicoListに取り込みます。（※公開設定のマイリストのみ）</p>
        <div class="input-group" style="margin-bottom: 8px;">
          <select id="select-import-target" style="flex:1; padding:8px 12px; border-radius:var(--nl-radius-sm); border:1px solid var(--nl-border); background:var(--nl-bg-input); color:var(--nl-text); outline:none;">
            <option value="new">(新しいリストとして取り込む)</option>
          </select>
        </div>
        <div class="input-group">
          <input type="text" id="input-mylist-id" placeholder="マイリストID (例: 1234567)">
          <button id="btn-import-mylist" class="action-btn primary">取り込み</button>
        </div>
        <div id="mylist-status" class="status-msg"></div>
      </section>

      <section class="settings-section">
        <h3>データ管理</h3>
        <p class="settings-desc">リストデータのバックアップとリストアを行います。</p>
        <div class="button-row">
          <button id="btn-export-json" class="action-btn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg> エクスポート (JSON)
          </button>
          <label class="action-btn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> インポート
            <input type="file" id="input-import-json" accept=".json" style="display:none;">
          </label>
        </div>
      </section>

      <div class="footer-info">
        NicoList<br>
        <span class="text-muted">Unofficial Extension</span>
      </div>
    </div>
  </main>

  <!-- 汎用入力モーダル -->
  <div id="modal-text-input" class="modal-overlay hidden">
    <div class="modal-content">
      <h3 id="modal-text-title">タイトル</h3>
      <input type="text" id="modal-text-input-field" class="modal-input" placeholder="入力してください">
      <div class="modal-buttons">
        <button id="btn-modal-text-cancel" class="action-btn">キャンセル</button>
        <button id="btn-modal-text-save" class="action-btn primary">保存</button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
