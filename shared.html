<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>NicoList - 共有リスト</title>
  <link rel="stylesheet" href="fullview.css">
  <style>
    body { overflow: hidden; }
    .shared-page { display: flex; flex-direction: column; height: calc(100vh - 60px); }
    .shared-toolbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 24px; border-bottom: 1px solid var(--nl-border);
      background: var(--nl-bg-header); flex-shrink: 0; flex-wrap: wrap; gap: 10px;
    }
    .shared-toolbar-left { display: flex; align-items: center; gap: 12px; }
    .shared-toolbar-left h2 { margin: 0; font-size: 18px; font-weight: 600; }
    .shared-badge {
      background: var(--nl-primary); color: #fff; font-size: 11px;
      padding: 3px 10px; border-radius: 12px; font-weight: 500; flex-shrink: 0;
    }
    .shared-count { color: var(--nl-text-muted); font-size: 13px; }
    .shared-toolbar-right { display: flex; align-items: center; gap: 10px; }
    .shared-progress {
      padding: 6px 14px; background: var(--nl-bg-card); border: 1px solid var(--nl-border);
      border-radius: var(--nl-radius-sm); font-size: 12px; color: var(--nl-text-secondary);
    }
    .shared-import-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 20px; border-radius: var(--nl-radius);
      background: var(--nl-primary); color: #fff; border: none;
      cursor: pointer; font-size: 13px; font-weight: 600;
      transition: background var(--nl-transition);
    }
    .shared-import-btn:hover { background: var(--nl-primary-hover); }
    .shared-import-btn:disabled { opacity: 0.5; cursor: default; }
    .shared-import-btn.done { background: var(--nl-success); }
    .shared-content { flex: 1; overflow-y: auto; padding: 20px 24px; }

    /* ペースト入力画面 */
    .shared-paste-area {
      display: flex; flex-direction: column; align-items: center;
      gap: 16px; padding: 80px 20px; text-align: center; height: 100%;
    }
    .shared-paste-area h3 { font-size: 22px; color: var(--nl-text-secondary); margin: 0; }
    .shared-paste-area p { color: var(--nl-text-muted); margin: 0; }
    .shared-paste-input {
      width: 100%; max-width: 600px; padding: 14px;
      background: var(--nl-bg-input); border: 1px solid var(--nl-border);
      color: var(--nl-text); border-radius: var(--nl-radius);
      font-family: monospace; font-size: 13px; resize: vertical; min-height: 80px;
    }
    .shared-paste-input:focus { outline: none; border-color: var(--nl-primary); }
    .shared-paste-btn {
      padding: 10px 28px; background: var(--nl-primary); color: #fff;
      border: none; border-radius: var(--nl-radius); cursor: pointer;
      font-size: 14px; font-weight: 600; transition: background var(--nl-transition);
    }
    .shared-paste-btn:hover { background: var(--nl-primary-hover); }
    .shared-empty { text-align: center; padding: 60px 20px; color: var(--nl-text-muted); }
    .shared-empty h3 { font-size: 20px; margin-bottom: 8px; color: var(--nl-text-secondary); }
  </style>
</head>
<body>
  <!-- ヘッダー -->
  <header class="fv-header">
    <div class="fv-logo">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--nl-primary)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      <h1>NicoList <span style="font-size:13px;color:var(--nl-text-muted);font-weight:400;">共有リスト</span></h1>
    </div>
    <div class="fv-header-actions">
      <div class="fv-view-toggle" id="view-toggle" style="display:none;">
        <button id="btn-view-list" class="fv-icon-btn" title="リスト表示">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        </button>
        <button id="btn-view-grid" class="fv-icon-btn active" title="グリッド表示">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        </button>
      </div>
    </div>
  </header>

  <div id="shared-root"></div>

  <script src="shared.js"></script>
</body>
</html>
